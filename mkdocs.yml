site_name: ナレッジ管理ツール (VBA 製)
site_description: Excel VBA ベースのナレッジ管理ツール - 仕様書・操作手順・アーキテクチャ
site_url: https://ai-crafted-portfolio.github.io/knowledgevba/
site_author: ai-crafted-portfolio

copyright: Copyright &copy; 2026 ai-crafted-portfolio

theme:
  name: material
  custom_dir: overrides
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  font:
    text: Noto Sans JP
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - 概要: index.md
  - 仕様: spec.md
  - セットアップ: setup.md
  - 操作手順: operations.md
  - アーキテクチャ: architecture.md
  - Q&A (なぜこの設計？): qa.md
  - ソースコード:
      - 一覧: source/index.md
      - エントリポイント:
          - modEntryMain: source/entrypoint/modentrymain.md
          - modEntrySearch: source/entrypoint/modentrysearch.md
          - modEntryKnowledge: source/entrypoint/modentryknowledge.md
          - modEntryFormat: source/entrypoint/modentryformat.md
          - modEntrySettings: source/entrypoint/modentrysettings.md
          - modSpecExamples: source/entrypoint/modspecexamples.md
      - ビジネスロジック:
          - clsSearchEngine: source/business-logic/clssearchengine.md
          - clsKnowledgeManager: source/business-logic/clsknowledgemanager.md
          - clsFormatManager: source/business-logic/clsformatmanager.md
          - clsTaskController: source/business-logic/clstaskcontroller.md
          - clsStorageResolver: source/business-logic/clsstorageresolver.md
          - clsFieldMigrator: source/business-logic/clsfieldmigrator.md
          - clsFormSpec: source/business-logic/clsformspec.md
          - clsControlSpec: source/business-logic/clscontrolspec.md
          - modFormBuilder: source/business-logic/modformbuilder.md
      - ユーティリティ:
          - modCommon: source/utility/modcommon.md
          - modFileIO: source/utility/modfileio.md
          - modStringUtil: source/utility/modstringutil.md
          - modDateUtil: source/utility/moddateutil.md
          - modImageRender: source/utility/modimagerender.md
          - modFormatColumns: source/utility/modformatcolumns.md
      - インストーラ:
          - modSetup: source/infrastructure/modsetup.md
      - ログ:
          - clsLogger: source/logger/clslogger.md
          - clsLogEntry: source/logger/clslogentry.md
      - 特殊モジュール:
          - ThisWorkbook (本番版): source/special/thisworkbook.md
      - Cowork デモ専用:
          - ThisWorkbook (デモ版): source/cowork-demo/thisworkbook.md
          - modAutoInit: source/cowork-demo/modautoinit.md
          - modDemoSeeder: source/cowork-demo/moddemoseeder.md
