site_name: ナレッジ管理ツール (VBA 製)
site_description: Excel VBA ベースのナレッジ管理ツール - 構成・導入・操作・設計
site_url: https://ai-crafted-portfolio.github.io/knowledgevba/
site_author: ai-crafted-portfolio

copyright: Copyright &copy; 2026 ai-crafted-portfolio

theme:
  name: material
  custom_dir: overrides
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  font:
    text: Noto Sans JP
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - 概要: index.md
  - 設計:
      - 全体アーキテクチャ: architecture.md
      - 仕様: spec.md
  - 使い方:
      - 導入手順: setup.md
      - 操作手順: operations.md
  - 設定とカスタマイズ:
      - 設定値の変更: settings.md
      - 画面のカスタマイズ: screen_customization_guide_v2.md
  - ソースコード:
      - 一覧: source/index.md
      - インストーラ層:
          - modSetup.bas: source/infrastructure/modsetup.md
      - エントリポイント層:
          - modEntryFormat.bas: source/entrypoint/modentryformat.md
          - modEntryKnowledge.bas: source/entrypoint/modentryknowledge.md
          - modEntrySearch.bas: source/entrypoint/modentrysearch.md
          - modEntrySettings.bas: source/entrypoint/modentrysettings.md
          - modSpecExamples.bas: source/entrypoint/modspecexamples.md
      - 画面層:
