site_name: ナレッジ管理ツール (VBA 製)
site_description: Excel VBA ベースのナレッジ管理ツール - 仕様書・操作手順・アーキテクチャ
site_url: https://ai-crafted-portfolio.github.io/knowledgevba/
site_author: ai-crafted-portfolio

copyright: Copyright &copy; 2026 ai-crafted-portfolio

theme:
  name: material
  custom_dir: overrides
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切替
  font:
    text: Noto Sans JP
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

nav:
  - 概要: index.md
  - インストール: install.md
  - 仕様: spec.md
  - アーキテクチャ: architecture.md
  - 操作マニュアル: operations.md
  - ソースコード:
      - 一覧: source/index.md
      - エントリポイント:
          - modEntryMain: source/entrypoint/modentrymain.md
          - modEntrySearch: source/entrypoint/modentrysearch.md
          - modEntryKnowledge: source/entrypoint/modentryknowledge.md
          - modEntryFormat: source/entrypoint/modentryformat.md
          - modEntrySettings: source/entrypoint/modentrysettings.md
          - modSpecExamples: source/entrypoint/modspecexamples.md
      - ビジネスロジック:
          - IScreenRenderer: source/business-logic/iscreenrenderer.md
          - clsSearchEngine: source/business-logic/clssearchengine.md
          - clsKnowledgeManager: source/business-logic/clsknowledgemanager.md
          - clsFormatManager: source/business-logic/clsformatmanager.md
          - clsTaskController: source/business-logic/clstaskcontroller.md
          - clsStorageResolver: source/business-logic/clsstorageresolver.md
          - clsFieldMigrator: source/business-logic/clsfieldmigrator.md
          - clsFormSpec: source/business-logic/clsformspec.md
          - clsControlSpec: source/business-logic/clscontrolspec.md
          - clsButtonSpec: source/business-logic/clsbuttonspec.md
          - clsFieldSpec: source/business-logic/clsfieldspec.md
          - clsScreenSpec: source/business-logic/clsscreenspec.md
          - clsSectionSpec: source/business-logic/clssectionspec.md
          - clsSetupOrchestrator: source/business-logic/clssetuporchestrator.md
          - clsSheetRenderer: source/business-logic/clssheetrenderer.md
          - clsUserFormRenderer: source/business-logic/clsuserformrenderer.md
          - modFactory: source/business-logic/modfactory.md
          - modFormBuilder: source/business-logic/modformbuilder.md
          - modScreenRender: source/business-logic/modscreenrender.md
          - modScreenSpecRegistry: source/business-logic/modscreenspecregistry.md
      - 画面層:
          - clsMainScreen (M-01): source/screens/clsmainscreen.md
          - clsFormatListScreen (M-02): source/screens/clsformatlistscreen.md
          - clsFormatDesignScreen (M-03): source/screens/clsformatdesignscreen.md
          - clsFormatPreviewScreen (M-04): source/screens/clsformatpreviewscreen.md
          - clsKnowledgeRegisterScreen (M-05): source/screens/clsknowledgeregisterscreen.md
          - clsKnowledgeEditScreen (M-06): source/screens/clsknowledgeeditscreen.md
          - clsKnowledgeListScreen (M-07): source/screens/clsknowledgelistscreen.md
          - clsSearchScreen (M-08): source/screens/clssearchscreen.md
          - clsKnowledgeViewScreen (M-09): source/screens/clsknowledgeviewscreen.md
          - clsStorageScreen (M-10): source/screens/clsstoragescreen.md
          - clsSystemSettingsScreen (M-11): source/screens/clssystemsettingsscreen.md
          - clsMigrationScreen (M-12): source/screens/clsmigrationscreen.md
          - clsFileFormatScreen (M-13): source/screens/clsfileformatscreen.md
          - clsLogScreen (M-14): source/screens/clslogscreen.md
      - ユーティリティ:
          - modCommon: source/utility/modcommon.md
          - modFileIO: source/utility/modfileio.md
          - modStringUtil: source/utility/modstringutil.md
          - modDateUtil: source/utility/moddateutil.md
          - modImageRender: source/utility/modimagerender.md
      - インストーラ:
