site_name: 繝翫Ξ繝・ず邂｡逅・ヤ繝ｼ繝ｫ (VBA 陬ｽ)
site_description: Excel VBA 繝吶・繧ｹ縺ｮ繝翫Ξ繝・ず邂｡逅・ヤ繝ｼ繝ｫ - 讒区・繝ｻ蟆主・繝ｻ謫堺ｽ懊・險ｭ險・site_url: https://ai-crafted-portfolio.github.io/knowledgevba/
site_author: ai-crafted-portfolio

copyright: Copyright &copy; 2026 ai-crafted-portfolio

theme:
  name: material
  custom_dir: overrides
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 繝繝ｼ繧ｯ繝｢繝ｼ繝峨↓蛻・崛
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 繝ｩ繧､繝医Δ繝ｼ繝峨↓蛻・崛
  font:
    text: Noto Sans JP
    code: JetBrains Mono

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

