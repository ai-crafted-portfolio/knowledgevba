name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Convert docs/modules/*.md from CP932 (Shift_JIS) to UTF-8 for mkdocs build
        # git repo stores docs/modules/**/*.md as CP932 (per user requirement so that
        # raw view / git clone yields Shift_JIS bytes). mkdocs reads UTF-8 only, so
        # we convert in-place inside the CI workspace before build. The converted
        # files are NOT pushed back to the repo - they only live in the CI runner.
        run: |
          python - <<'PY'
          import os
          root = "docs/modules"
          n_cp932 = 0
          n_already_utf8 = 0
          for dirpath, dirnames, filenames in os.walk(root):
              for name in filenames:
                  if not name.endswith(".md"):
                      continue
                  path = os.path.join(dirpath, name)
                  with open(path, "rb") as f:
                      raw = f.read()
                  try:
                      text = raw.decode("utf-8")
                      n_already_utf8 += 1
                      continue
                  except UnicodeDecodeError:
                      pass
                  try:
                      text = raw.decode("cp932")
                  except UnicodeDecodeError as e:
                      raise SystemExit("failed to decode " + path + " as cp932 or utf-8: " + str(e))
                  with open(path, "wb") as f:
                      f.write(text.encode("utf-8"))
                  n_cp932 += 1
          print("converted CP932 -> UTF-8: " + str(n_cp932) + " files")
          print("already UTF-8:           " + str(n_already_utf8) + " files")
          PY

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
